<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Help & Support — ADT GROUPS</title>
<link rel="stylesheet" href="style.css"/>
<style>
.sup-wrap{max-width:640px;margin:0 auto;display:flex;flex-direction:column;height:100vh;}

/* HEADER */
.sup-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border);background:rgba(5,5,10,0.92);backdrop-filter:blur(18px);position:sticky;top:0;z-index:10;flex-shrink:0;}
.sup-back{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;transition:all 0.2s;flex-shrink:0;text-decoration:none;}
.sup-back:hover{border-color:var(--gold);color:var(--gold2);}
.sup-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#a07828);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative;}
.sup-avatar::after{content:'';position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid var(--dark);animation:pdot 2s infinite;}
.sup-agent-name{font-family:var(--font-display);font-size:15px;font-weight:700;}
.sup-agent-sub{font-size:11px;color:var(--green2);margin-top:1px;}

/* QUICK QUESTIONS */
.quick-wrap{padding:16px 18px;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--dark);}
.quick-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px;}
.quick-chips{display:flex;gap:8px;flex-wrap:wrap;}
.quick-chip{background:var(--card);border:1px solid var(--border);border-radius:100px;padding:6px 13px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.18s;white-space:nowrap;}
.quick-chip:hover{border-color:var(--gold);color:var(--gold2);background:var(--gold-dim);}

/* CHAT MESSAGES */
.chat-messages{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
.msg-row{display:flex;gap:8px;animation:fade-up 0.28s ease both;}
.msg-row.user-row{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.msg-av.bot-av{background:linear-gradient(135deg,var(--gold),#a07828);}
.msg-av.user-av{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;font-weight:700;font-size:11px;}
.msg-av.admin-av{background:linear-gradient(135deg,var(--red),#991b1b);color:#fff;font-weight:700;font-size:11px;}
.msg-bubble{max-width:78%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6;}
.msg-bubble.bot{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px;}
.msg-bubble.user{background:linear-gradient(135deg,var(--gold),#b8983e);color:#000;font-weight:600;border-bottom-right-radius:4px;}
.msg-bubble.admin{background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(239,68,68,0.08));border:1px solid rgba(239,68,68,0.2);border-bottom-left-radius:4px;}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px;}
.msg-row.user-row .msg-time{text-align:right;}
.msg-sender{font-size:10px;font-weight:700;color:var(--red2);margin-bottom:2px;}

/* TYPING */
.typing-row{display:flex;gap:8px;}
.typing-bubble{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;display:inline-flex;align-items:center;gap:4px;}
.t-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:tdot 1.2s ease-in-out infinite;}
.t-dot:nth-child(2){animation-delay:0.2s;}
.t-dot:nth-child(3){animation-delay:0.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* AGENT CARD */
.agent-card{background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(59,130,246,0.03));border:1px solid rgba(59,130,246,0.2);border-radius:14px;padding:14px 16px;}
.agent-card-title{font-size:13px;font-weight:700;color:var(--blue2);margin-bottom:4px;}
.agent-card-sub{font-size:12px;color:var(--text2);line-height:1.5;}

/* INPUT */
.chat-input-wrap{padding:12px 18px;border-top:1px solid var(--border);background:rgba(5,5,10,0.92);backdrop-filter:blur(18px);flex-shrink:0;}
.chat-input-row{display:flex;gap:8px;background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:6px 6px 6px 14px;transition:border-color 0.2s;}
.chat-input-row:focus-within{border-color:var(--gold);}
.chat-inp{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:14px;padding:5px 0;}
.chat-inp::placeholder{color:var(--text3);}
.chat-send{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#a07828);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.chat-send:hover{transform:scale(1.08);}
.chat-send:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
</style>
</head>
<body>
<div class="noise"></div>
<div class="sup-wrap">

  <!-- HEADER -->
  <div class="sup-header">
    <a class="sup-back" href="dashboard.html">←</a>
    <div class="sup-avatar">🤖</div>
    <div>
      <div class="sup-agent-name">ADT Support</div>
      <div class="sup-agent-sub" id="agent-status"><span class="status-dot green"></span> Online · Replies instantly</div>
    </div>
  </div>

  <!-- QUICK QUESTIONS -->
  <div class="quick-wrap" id="quick-wrap">
    <div class="quick-label">Common Questions</div>
    <div class="quick-chips" id="quick-chips"></div>
  </div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="chat-messages"></div>

  <!-- INPUT -->
  <div class="chat-input-wrap">
    <div class="chat-input-row">
      <input class="chat-inp" id="chat-inp" placeholder="Type your message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}">
      <button class="chat-send" id="send-btn" onclick="sendMsg()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
// ── QUICK QA ───────────────────────────────────────────────
const QA=[
  {q:'Deposit pending',a:'Deposits are usually approved within 1–4 hours. If it\'s been over 6 hours, please share your UTR number and we\'ll check right away! ✅'},
  {q:'Withdrawal not processed',a:'Withdrawals are processed within 24–48 working hours. Your amount has been held safely. If it\'s been more than 48 hours, share your Transaction ID and we\'ll escalate it immediately. 🚀'},
  {q:'How to claim daily earnings?',a:'Go to <b>My Products</b> in your dashboard. Click the <b>Claim</b> button daily to receive your earnings. ⚠️ Claim every 24 hours — missed claims cannot be recovered!'},
  {q:'Forgot password',a:'On the login page, tap <b>Forgot Password?</b>. You\'ll need your registered email and Recovery Secret Text. Follow the steps to reset your password. Still stuck? Share your email and we\'ll help! 🔐'},
  {q:'Referral reward not credited',a:'Referral rewards are credited when your friend registers with your code AND makes their first deposit. Check your Referral section for status. Share their email if needed! 💰'},
  {q:'How to start investing?',a:'Simple! 1️⃣ Deposit funds 2️⃣ Go to Browse Products 3️⃣ Pick a plan (Farming/Real Estate/Business) 4️⃣ Click Buy Now. Daily earnings start from the next day! 🎉'},
  {q:'Payment failed, money deducted',a:'If money was deducted but payment shows failed, it\'s usually auto-refunded by your bank within 2–3 working days. If not refunded after 3 days, share your UTR and screenshot! 🔄'},
];

// ── STATE ──────────────────────────────────────────────────
let currentUser=null, userData=null;
let chatId=null, messagesListener=null;
let botReplied=false;

// ── AUTH ───────────────────────────────────────────────────
auth.onAuthStateChanged(async u=>{
  if(!u){window.location.href='/';return;}
  currentUser=u;
  try{const d=await db.collection('users').doc(u.uid).get();if(d.exists)userData=d.data();}catch(e){}
  initChat();
});

// ── INIT CHAT ──────────────────────────────────────────────
async function initChat(){
  // Get or create chat doc for this user
  try{
    const snap=await db.collection('support_chats')
      .where('userId','==',currentUser.uid)
      .where('status','==','open')
      .limit(1).get();

    if(!snap.empty){
      chatId=snap.docs[0].id;
      // Check if there are existing messages
      const msgSnap=await db.collection('support_chats').doc(chatId).collection('messages').limit(1).get();
      if(msgSnap.empty){
        // No messages yet - show quick chips
        document.getElementById('quick-wrap').style.display='block';
      }
    } else {
      const ref=await db.collection('support_chats').add({
        userId:currentUser.uid,
        userName:userData?.name||'User',
        userEmail:currentUser.email||'',
        status:'open',
        unreadAdmin:0,
        lastMessage:'',
        lastAt:firebase.firestore.FieldValue.serverTimestamp(),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      chatId=ref.id;
      // Show quick chips for new chat
      document.getElementById('quick-wrap').style.display='block';
      // Welcome bot message
      await addBotMessage('👋 Hello '+( userData?.name?.split(' ')[0]||'there')+'! Welcome to ADT Groups Support.\n\nI\'m here to help with deposits, withdrawals, products, and more. Pick a quick question or type your own!');
    }
    renderQuickChips();
    // Show quick chips if no messages
    listenMessages();
  }catch(e){console.error(e);}
}

// ── RENDER QUICK CHIPS ─────────────────────────────────────
function renderQuickChips(){
  const wrap=document.getElementById('quick-chips');
  wrap.innerHTML=QA.map((item,i)=>
    `<div class="quick-chip" onclick="handleQuickQ(${i})">${item.q}</div>`
  ).join('');
}

function handleQuickQ(i){
  const item=QA[i];
  document.getElementById('quick-wrap').style.display='none';
  sendUserMessage(item.q, true);
  setTimeout(()=>addBotMessage(item.a), 900+Math.random()*500);
}

// ── LISTEN MESSAGES (real-time) ────────────────────────────
function listenMessages(){
  if(!chatId)return;
  if(messagesListener)messagesListener();
  messagesListener=db.collection('support_chats').doc(chatId)
    .collection('messages')
    .orderBy('createdAt','asc')
    .onSnapshot(snap=>{
      const area=document.getElementById('chat-messages');
      area.innerHTML='';
      snap.docs.forEach(d=>renderMessage(d.data()));
      scrollBottom();
      // Mark admin messages as read
      markAdminRead(snap.docs);
    },e=>console.error(e));
}

function markAdminRead(docs){
  const unread=docs.filter(d=>d.data().sender==='admin'&&!d.data().readByUser);
  const batch=db.batch();
  unread.forEach(d=>batch.update(d.ref,{readByUser:true}));
  if(unread.length>0)batch.commit().catch(()=>{});
}

// ── RENDER MESSAGE ─────────────────────────────────────────
function renderMessage(msg){
  const area=document.getElementById('chat-messages');
  const row=document.createElement('div');
  const isUser=msg.sender==='user';
  const isAdmin=msg.sender==='admin';
  const isBot=msg.sender==='bot';

  row.className='msg-row'+(isUser?' user-row':'');

  const init=isUser?(userData?.name||'U')[0].toUpperCase():'A';
  const avClass=isUser?'user-av':isAdmin?'admin-av':'bot-av';
  const avContent=isUser?init:isAdmin?'A':'🤖';
  const bubbleClass=isUser?'user':isAdmin?'admin':'bot';

  const time=msg.createdAt?.toDate?new Date(msg.createdAt.toDate()).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'';

  row.innerHTML=`
    <div class="msg-av ${avClass}">${avContent}</div>
    <div>
      ${isAdmin?'<div class="msg-sender">ADT Support Agent</div>':''}
      <div class="msg-bubble ${bubbleClass}">${msg.text||''}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  area.appendChild(row);
}

// ── SEND USER MESSAGE ──────────────────────────────────────
async function sendMsg(){
  const inp=document.getElementById('chat-inp');
  const text=inp.value.trim();
  if(!text||!chatId)return;
  inp.value='';
  document.getElementById('quick-wrap').style.display='none';
  await sendUserMessage(text, false);
}

async function sendUserMessage(text, isQuick){
  if(!chatId)return;
  try{
    // Save to Firebase
    await db.collection('support_chats').doc(chatId)
      .collection('messages').add({
        sender:'user',
        text:text,
        readByAdmin:false,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    // Update chat meta
    await db.collection('support_chats').doc(chatId).update({
      lastMessage:text,
      lastAt:firebase.firestore.FieldValue.serverTimestamp(),
      unreadAdmin:firebase.firestore.FieldValue.increment(1)
    });

    if(!isQuick){
      // Try to match FAQ
      const lower=text.toLowerCase();
      const match=QA.find(item=>
        item.q.toLowerCase().split(' ').some(w=>w.length>3&&lower.includes(w))
      );
      if(match){
        showTyping();
        setTimeout(async()=>{
          removeTyping();
          await addBotMessage(match.a);
        },900+Math.random()*500);
      } else {
        // Unknown → agent alert
        showTyping();
        setTimeout(async()=>{
          removeTyping();
          await addBotMessage('Got it! Connecting you to our support agent... ⏳');
          setTimeout(async()=>{
            await addBotMessage(`<div class="agent-card"><div class="agent-card-title">👨‍💼 Agent joining the chat...</div><div class="agent-card-sub">Our support agent will reply shortly. Typical wait: <b>2–5 minutes</b>.<br>You can also reach us on Telegram for faster help!</div></div>`);
          },1200);
        },700);
      }
    }
  }catch(e){console.error(e);}
}

// ── BOT MESSAGE ────────────────────────────────────────────
async function addBotMessage(text){
  if(!chatId)return;
  try{
    await db.collection('support_chats').doc(chatId)
      .collection('messages').add({
        sender:'bot',
        text:text,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
  }catch(e){}
}

// ── TYPING INDICATOR ───────────────────────────────────────
function showTyping(){
  const area=document.getElementById('chat-messages');
  const row=document.createElement('div');
  row.className='typing-row';row.id='typing-ind';
  row.innerHTML=`<div class="msg-av bot-av">🤖</div><div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  area.appendChild(row);
  scrollBottom();
}
function removeTyping(){const el=document.getElementById('typing-ind');if(el)el.remove();}

function scrollBottom(){
  const area=document.getElementById('chat-messages');
  setTimeout(()=>area.scrollTop=area.scrollHeight,80);
}
</script>
</body>
</html>
