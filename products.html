<script>
// ADT Gate Check
(function(){
  var VERIFY = 'https://advanced-multi-layer-enterprise-fir.vercel.app';
  var KEY = 'adt_sec_v1';
  var DAYS = 7;
  var params = new URLSearchParams(window.location.search);
  var tk = params.get('adt_v');
  if(tk){
    localStorage.setItem(KEY, JSON.stringify({v:tk, exp:Date.now()+DAYS*86400000}));
    window.history.replaceState({},'',window.location.pathname);
  }
  try{
    var t = JSON.parse(localStorage.getItem(KEY));
    if(t && Date.now() < t.exp) return;
    localStorage.removeItem(KEY);
  }catch(e){}
  window.location.replace(VERIFY + '?from=' + encodeURIComponent(window.location.href));
})();
</script>

<title>Products — ADT GROUPS</title>
<link rel="stylesheet" href="style.css"/>
<style>
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 48px;height:66px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(24px);background:rgba(5,5,10,0.88);}
.nav-right{display:flex;align-items:center;gap:10px;}
.back-btn{display:flex;align-items:center;gap:7px;color:var(--text2);text-decoration:none;font-size:14px;font-weight:500;transition:color 0.2s;cursor:pointer;}
.back-btn:hover{color:var(--gold2);}

.cat-hero{padding-top:66px;position:relative;overflow:hidden;}
.cat-hero-img{height:280px;position:relative;display:flex;align-items:flex-end;}
.cat-hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 0.5s;}
.cat-hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,5,10,0.3) 0%,rgba(5,5,10,0.92) 100%);}
.cat-hero-content{position:relative;z-index:2;padding:32px 48px;width:100%;}
.cat-eyebrow{font-size:10px;font-family:var(--font-mono);letter-spacing:3px;color:var(--gold2);text-transform:uppercase;margin-bottom:8px;}
.cat-hero-title{font-family:var(--font-display);font-size:clamp(32px,4vw,52px);font-weight:800;letter-spacing:-0.5px;color:#fff;margin-bottom:8px;}
.cat-hero-desc{font-size:14px;color:var(--text2);max-width:520px;line-height:1.65;}

.products-section{max-width:1200px;margin:0 auto;padding:40px 48px 80px;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}

.empty-state{text-align:center;padding:72px 32px;color:var(--text3);}
.empty-icon{font-size:52px;margin-bottom:16px;}
.empty-text{font-size:16px;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:13px;}

/* PRODUCT CARD FULL */
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}
.pcard:hover{transform:translateY(-5px);border-color:var(--border2);box-shadow:0 18px 44px rgba(0,0,0,0.4);}
.pcard-img{height:168px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.pcard-img-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 0.5s;}
.pcard:hover .pcard-img-bg{transform:scale(1.07);}
.pcard-img-overlay{position:absolute;inset:0;}
.pcard-img-icon{position:relative;z-index:2;font-size:40px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.6));}
.pcard-risk{position:absolute;top:10px;right:10px;z-index:3;font-size:10px;font-family:var(--font-mono);font-weight:700;padding:3px 9px;border-radius:100px;}
.risk-low{background:rgba(29,185,84,0.2);color:var(--green2);border:1px solid rgba(29,185,84,0.3);}
.risk-medium{background:rgba(201,168,76,0.2);color:var(--gold2);border:1px solid rgba(201,168,76,0.3);}
.risk-high{background:rgba(239,68,68,0.2);color:var(--red2);border:1px solid rgba(239,68,68,0.3);}
.pcard-body{padding:20px;}
.pcard-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.pcard-name{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:5px;}
.pcard-desc{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:14px;}
.pcard-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.pcard-meta-item{background:var(--dark);border:1px solid var(--border);border-radius:9px;padding:9px 11px;}
.pcard-meta-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px;}
.pcard-meta-val{font-size:13px;font-weight:600;}
.pcard-meta-val.green{color:var(--green2);}
.pcard-meta-val.gold{color:var(--gold2);}
.pcard-daily{background:linear-gradient(135deg,var(--gold-dim),rgba(201,168,76,0.05));border:1px solid rgba(201,168,76,0.2);border-radius:10px;padding:12px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;}
.pcard-daily-left{font-size:11px;color:var(--text2);}
.pcard-daily-val{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--gold2);}
.pcard-daily-lbl{font-size:10px;color:var(--text3);}
.pcard-buy{width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;font-family:var(--font-body);cursor:pointer;border:none;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:7px;}

/* BUY CONFIRM MODAL */
.buy-modal-product{display:flex;align-items:center;gap:12px;background:var(--dark);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:18px;}
.buy-modal-icon{font-size:32px;flex-shrink:0;}
.buy-modal-name{font-family:var(--font-display);font-size:17px;font-weight:700;margin-bottom:2px;}
.buy-modal-meta{font-size:11px;color:var(--text2);}
.buy-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.buy-info-item{background:var(--dark);border:1px solid var(--border);border-radius:9px;padding:10px;}
.buy-info-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;}
.buy-info-val{font-size:14px;font-weight:600;}
.balance-row{background:var(--dark);border:1px solid var(--border);border-radius:11px;padding:13px 16px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
.balance-row-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;}
.balance-row-val{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--gold2);}

@media(max-width:768px){
  nav{padding:0 18px;}
  .cat-hero-content{padding:24px 20px;}
  .products-section{padding:28px 18px 60px;}
  .products-grid{grid-template-columns:1fr;}
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const urlParams  = new URLSearchParams(window.location.search);
const catId      = urlParams.get('cat') || 'farming';
let currentUser  = null;
let userData     = null;
let activeProd   = null;
let siteSettings = { tg:'https://t.me/adtgroups', help:'https://wa.me/919999999999' };

const catDefaults = {
  farming:    { name:'Agriculture', desc:'Invest in sustainable agriculture & organic farming projects.', img:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1200&q=80', icon:'🌾', eyebrow:'Farming / Agriculture', color:'var(--green)' },
  realestate: { name:'Real Estate', desc:'Build wealth with premium real estate opportunities.',              img:'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1200&q=80', icon:'🏛️', eyebrow:'Real Estate',           color:'var(--gold)'  },
  business:   { name:'Business',    desc:'Invest in innovative businesses & high-growth startups.',          img:'https://images.unsplash.com/photo-1573164713714-d95e436ab8d6?w=1200&q=80', icon:'💼', eyebrow:'Business',              color:'var(--blue)'  }
};

// Set defaults immediately
const def = catDefaults[catId] || catDefaults.farming;
document.getElementById('cat-hero-bg').style.backgroundImage    = `url('${def.img}')`;
document.getElementById('cat-hero-title').textContent           = def.name;
document.getElementById('cat-hero-desc').textContent            = def.desc;
document.getElementById('cat-eyebrow').textContent              = def.eyebrow;
document.title = def.name + ' — ADT GROUPS';

// Auth state - allow browsing without login
auth.onAuthStateChanged(async user => {
  hideSplash();
  if (user) {
    currentUser = user;
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      if (doc.exists){
        userData = doc.data();
        // Phone verification check
        if(userData.phoneVerified===false){
          await auth.signOut();
          window.location.href='/';
          return;
        }
      }
    } catch(e) {}
  }
  loadCategoryAndProducts();
  loadSettings();
});

async function loadSettings() {
  try {
    const doc = await db.collection('settings').doc('site').get();
    if (doc.exists) siteSettings = { ...siteSettings, ...doc.data() };
  } catch(e) {}
}

async function loadCategoryAndProducts() {
  try {
    // Load category data from Firebase
    const catDoc = await db.collection('categories').doc(catId).get();
    if (catDoc.exists) {
      const cat = catDoc.data();
      if (cat.image)       document.getElementById('cat-hero-bg').style.backgroundImage = `url('${cat.image}')`;
      if (cat.name)        document.getElementById('cat-hero-title').textContent = cat.name;
      if (cat.description) document.getElementById('cat-hero-desc').textContent  = cat.description;
    }
  } catch(e) {}

  // Load products
  try {
    const snap = await db.collection('products')
      .where('category','==',catId)
      .where('active','==',true)
      .get();
    allProds = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderProducts(allProds);
  } catch(e) {
    document.getElementById('products-grid').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Could not load products.</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

const tagHTML = {
  hot:      '<span class="tag-hot">🔥 Hot</span>',
  trending: '<span class="tag-trending">📈 Trending</span>',
  best:     '<span class="tag-best">⭐ Best Value</span>',
  new:      '<span class="tag-new">✨ New</span>',
};

function renderProducts(prods) {
  const grid = document.getElementById('products-grid');
  if (!prods.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">${def.icon}</div><div class="empty-text">No products available in this category yet.</div><div class="empty-sub">Check back soon!</div></div>`;
    return;
  }
  const catColor = { farming:'var(--green)', realestate:'var(--gold)', business:'var(--blue)' };
  const catImg   = { farming:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400&q=70', realestate:'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=400&q=70', business:'https://images.unsplash.com/photo-1573164713714-d95e436ab8d6?w=400&q=70' };
  const riskCls  = { Low:'risk-low', Medium:'risk-medium', High:'risk-high' };
  const btnStyle = {
    farming:    'background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;',
    realestate: 'background:linear-gradient(135deg,var(--gold),#a07828);color:#000;',
    business:   'background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;',
  };
  grid.innerHTML = prods.map(p => {
    const tags = (p.tags||[]).map(tg => tagHTML[tg]||`<span class="badge badge-muted">${tg}</span>`).join('');
    const rc   = riskCls[p.risk] || 'risk-medium';
    const bg   = p.image || catImg[catId] || catImg.farming;
    const color= catColor[catId] || catColor.farming;
    return `<div class="pcard" onclick="openBuyModal('${p.id}')">
      <div class="pcard-img">
        <div class="pcard-img-bg" style="background-image:url('${bg}')"></div>
        <div class="pcard-img-overlay" style="background:linear-gradient(180deg,transparent 30%,rgba(0,0,0,0.75) 100%)"></div>
        <div class="pcard-img-icon">${def.icon}</div>
        <div class="pcard-risk ${rc}">${p.risk||'Medium'} Risk</div>
      </div>
      <div class="pcard-body">
        ${tags ? `<div class="pcard-tags">${tags}</div>` : ''}
        <div class="pcard-name">${p.name||'Investment Product'}</div>
        <div class="pcard-desc">${p.description||''}</div>
        <div class="pcard-daily">
          <div><div class="pcard-daily-left">Daily Earning</div><div style="font-size:10px;color:var(--text3);">Claim daily</div></div>
          <div style="text-align:right;"><div class="pcard-daily-val">${formatINR(p.dailyEarning||0)}</div><div class="pcard-daily-lbl">per day</div></div>
        </div>
        <div class="pcard-meta">
          <div class="pcard-meta-item"><div class="pcard-meta-label">Cycle</div><div class="pcard-meta-val gold">${p.cycleDays||'—'} Days</div></div>
          <div class="pcard-meta-item"><div class="pcard-meta-label">Total Return</div><div class="pcard-meta-val green">${formatINR(p.totalReturn||0)}</div></div>
          <div class="pcard-meta-item"><div class="pcard-meta-label">Price</div><div class="pcard-meta-val" style="color:var(--gold2);">${formatINR(p.price||0)}</div></div>
          <div class="pcard-meta-item"><div class="pcard-meta-label">Risk</div><div class="pcard-meta-val">${p.risk||'Medium'}</div></div>
        </div>
        <button class="pcard-buy" style="${btnStyle[catId]||btnStyle.farming}">Buy Now — ${formatINR(p.price||0)} →</button>
      </div>
    </div>`;
  }).join('');
}

// BUY MODAL
let allProds = [];
async function openBuyModal(prodId) {
  if (!currentUser) { window.location.href = '/'; return; }
  // Load fresh if needed
  if (!allProds.length) {
    try {
      const snap = await db.collection('products').where('category','==',catId).where('active','==',true).get();
      allProds = snap.docs.map(d => ({id:d.id,...d.data()}));
    } catch(e) { return; }
  }
  activeProd = allProds.find(p => p.id === prodId);
  if (!activeProd) return;

  // Refresh user balance
  try {
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if (doc.exists) userData = doc.data();
  } catch(e) {}

  const balance = userData ? (userData.balance||0) : 0;
  const price   = activeProd.price || 0;
  const enough  = balance >= price;

  document.getElementById('bm-icon').textContent    = def.icon;
  document.getElementById('bm-name').textContent    = activeProd.name || '—';
  document.getElementById('bm-meta').textContent    = `${activeProd.cycleDays||'—'} day cycle · ${def.eyebrow}`;
  document.getElementById('bm-price').textContent   = formatINR(price);
  document.getElementById('bm-daily').textContent   = formatINR(activeProd.dailyEarning||0) + '/day';
  document.getElementById('bm-cycle').textContent   = (activeProd.cycleDays||'—') + ' Days';
  document.getElementById('bm-total').textContent   = formatINR(activeProd.totalReturn||0);
  document.getElementById('bm-balance').textContent = formatINR(balance);
  document.getElementById('bm-balance-status').innerHTML = enough
    ? '<span class="badge badge-green">✓ Sufficient</span>'
    : '<span class="badge badge-red">✗ Low Balance</span>';

  const btn = document.getElementById('buy-confirm-btn');
  btn.disabled = !enough;
  btn.textContent = enough ? `Buy Now — ${formatINR(price)}` : 'Insufficient Balance — Deposit First';
  btn.className   = enough ? 'btn btn-green btn-full btn-lg' : 'btn btn-ghost btn-full btn-lg';

  hideMsg('buy-err'); hideMsg('buy-ok');
  openModal('buy-modal');
}

async function confirmBuy() {
  if (!activeProd) return;
  if (!currentUser) { closeModal('buy-modal'); window.location.href = '/'; return; }
  if (!userData) return;
  const price   = activeProd.price || 0;
  const balance = userData.balance || 0;
  if (balance < price) { showMsg('buy-err', t('deposit_to_buy')); return; }

  const btn = document.getElementById('buy-confirm-btn');
  btn.disabled = true; btn.textContent = 'Processing...';

  try {
    const txnId  = generateTxnId();
    const now    = firebase.firestore.FieldValue.serverTimestamp();
    const batch  = db.batch();

    // Create investment record
    const invRef = db.collection('investments').doc();
    batch.set(invRef, {
      userId:       currentUser.uid,
      userName:     userData.name || '',
      userEmail:    currentUser.email,
      productId:    activeProd.id,
      productName:  activeProd.name,
      category:     catId,
      price:        price,
      dailyEarning: activeProd.dailyEarning || 0,
      cycleDays:    activeProd.cycleDays || 30,
      totalReturn:  activeProd.totalReturn || 0,
      txnId,
      status:       'active',
      daysClaimed:  0,
      lastClaimedAt: null,
      purchasedAt:  now,
      createdAt:    now
    });

    // Transaction record
    const txnRef = db.collection('transactions').doc(txnId);
    batch.set(txnRef, {
      txnId, userId: currentUser.uid, userName: userData.name||'',
      userEmail: currentUser.email, type: 'Investment',
      amount: price, productId: activeProd.id,
      productName: activeProd.name, category: catId,
      status: 'approved', createdAt: now
    });

    // Deduct from balance
    batch.update(db.collection('users').doc(currentUser.uid), {
      balance:  firebase.firestore.FieldValue.increment(-price),
      invested: firebase.firestore.FieldValue.increment(price)
    });

    await batch.commit();

    // Update local
    userData.balance  = balance - price;
    userData.invested = (userData.invested||0) + price;

    showMsg('buy-ok', `✅ ${activeProd.name} purchased! Redirecting to dashboard...`, 'success');
    setTimeout(() => { window.location.href = '/dashboard'; }, 2000);

  } catch(e) {
    showMsg('buy-err', 'Error: ' + e.message);
    btn.disabled = false; btn.textContent = `Buy Now — ${formatINR(activeProd.price||0)}`;
  }
}

function openTG()   { window.open(siteSettings.tg||'https://t.me/adtgroups','_blank'); }
function openHelp() { window.location.href='support.html'; }
window.addEventListener('load', () => initDraggable('float-widget'));
</script>
